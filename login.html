<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سوق فاقوس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3">🛒</div>
            <h1 class="text-2xl font-bold text-slate-800">سوق فاقوس</h1>
            <p class="text-sm text-slate-400 mt-1">لوحة الإدارة</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-600 mb-1 block">كلمة المرور</label>
                <input type="password" id="password-input" placeholder="أدخل كلمة المرور"
                    class="w-full p-3 border rounded-xl text-sm focus:outline-green-500"
                    onkeydown="if(event.key==='Enter') checkLogin()">
            </div>
            <div id="error-msg" class="hidden text-red-500 text-xs text-center font-bold">
                ❌ كلمة المرور غلط، حاول تاني!
            </div>
            <button onclick="checkLogin()"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition text-base">
                🔓 دخول
            </button>
        </div>
    </div>

    <script>
        // تشفير بسيط للباسورد
        const PASS_HASH = '7e6c3b9f2a1d4e8b5c0f3a6d9e2b7c4f1a8d5e0b3c6f9a2d7e4b1c8f5a0d3e6';

        // Check if already logged in
        if (sessionStorage.getItem('admin_auth') === 'true') {
            window.location.href = 'admin.html';
        }

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + 'faqous_salt_2024');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkLogin() {
            const input = document.getElementById('password-input').value;
            const hash = await hashPassword(input);

            // Hash of: Elkasafm@yahoo.com727$$
            const correctHash = await hashPassword('Elkasafm@yahoo.com727$$');

            if (hash === correctHash) {
                sessionStorage.setItem('admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
                setTimeout(() => {
                    document.getElementById('error-msg').classList.add('hidden');
                }, 3000);
            }
        }
    </script>
</body>
</html>
