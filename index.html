<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق فاقوس - المتجر الإلكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #cart-modal { display: none; }

        /* Carousel */
        .carousel-wrapper {
            overflow: hidden;
            position: relative;
        }
        .carousel-track {
            display: flex;
            gap: 12px;
            transition: transform 0.35s ease;
        }
        .carousel-track .product-card {
            min-width: calc(50% - 22px);
            flex-shrink: 0;
        }

        /* Qty control */
        .qty-control { display: flex; align-items: center; gap: 6px; }
        .qty-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            font-size: 16px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .qty-btn:hover { background: #e2e8f0; }
        .qty-display { font-weight: bold; font-size: 14px; min-width: 20px; text-align: center; }

        input:focus, textarea:focus { outline: 2px solid #16a34a; outline-offset: 1px; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 id="store-name" class="text-xl font-bold">جاري التحميل...</h1>
            <button id="cart-btn" class="relative bg-green-700 hover:bg-green-800 px-4 py-2 rounded-lg flex items-center gap-2 transition">
                <span>🛒 السلة</span>
                <span id="cart-count" class="bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-5">

        <!-- Categories -->
        <section class="mb-6">
            <div id="categories-container" class="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
                <p class="text-xs text-gray-400">جاري التحميل...</p>
            </div>
        </section>

        <!-- Products by section OR filtered -->
        <div id="products-main"></div>

    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-50 justify-end">
        <div class="bg-white w-full max-w-md h-full flex flex-col shadow-2xl">
            <div class="flex justify-between items-center border-b p-4">
                <h3 class="text-xl font-bold">🛒 سلة المشتريات</h3>
                <button id="close-cart" class="text-gray-500 hover:text-red-500 text-2xl leading-none">&times;</button>
            </div>

            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
                <p class="text-center text-gray-400 py-8">السلة فارغة حالياً</p>
            </div>

            <div class="border-t p-4 space-y-1 text-sm bg-gray-50">
                <div class="flex justify-between"><span>إجمالي المنتجات:</span> <span id="subtotal-val">0.00 ج.م</span></div>
                <div class="flex justify-between"><span>مصاريف التوصيل:</span> <span id="delivery-val">0.00 ج.م</span></div>
                <div class="flex justify-between font-bold text-base text-green-600 border-t pt-2 mt-1"><span>الإجمالي الكلي:</span> <span id="total-val">0.00 ج.م</span></div>
            </div>

            <div class="p-4 space-y-3 overflow-y-auto max-h-96">
                <h4 class="font-bold text-gray-700 border-b pb-1">📍 بيانات التوصيل</h4>
                <input type="text" id="order-fullname"    placeholder="الاسم بالكامل *"          class="w-full p-2 border rounded text-sm">
                <input type="tel"  id="order-whatsapp"    placeholder="رقم الواتساب *"           class="w-full p-2 border rounded text-sm">
                <input type="tel"  id="order-phone-extra" placeholder="رقم إضافي (اختياري)"     class="w-full p-2 border rounded text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="order-zone"   placeholder="المنطقة / الحي *"         class="p-2 border rounded text-sm">
                    <input type="text" id="order-street" placeholder="اسم الشارع *"             class="p-2 border rounded text-sm">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="order-house"     placeholder="رقم المنزل *"          class="p-2 border rounded text-sm">
                    <input type="text" id="order-floor"     placeholder="الدور"                 class="p-2 border rounded text-sm">
                    <input type="text" id="order-apartment" placeholder="الشقة"                 class="p-2 border rounded text-sm">
                </div>
                <input type="text" id="order-landmark" placeholder="علامة مميزة..." class="w-full p-2 border rounded text-sm">
                <textarea id="order-notes" placeholder="ملاحظات إضافية..." rows="2" class="w-full p-2 border rounded text-sm"></textarea>
                <button id="submit-order-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow transition">
                    ✅ تأكيد الطلب وإرساله
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/db.js"></script>
    <script src="js/store.js"></script>
</body>
</html>
