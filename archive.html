<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الطلبات - سوق فاقوس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/admin.css">
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }</style>
    <script>
        if (sessionStorage.getItem("admin_auth") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-800 flex flex-col md:flex-row min-h-screen">

    <aside class="bg-slate-900 text-white w-full md:w-64 p-6 flex flex-col shadow-xl">
        <div class="mb-8 text-center border-b border-slate-700 pb-4">
            <div class="text-3xl mb-1">🛒</div>
            <h2 class="text-xl font-bold text-green-400">سوق فاقوس</h2>
            <span class="text-xs text-slate-400">لوحة الإدارة السحابية</span>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="admin.html"    class="flex items-center gap-2 w-full text-right px-4 py-3 text-slate-300 hover:bg-slate-800 rounded-lg font-medium transition">📦 طلبات اليوم</a>
            <a href="archive.html"  class="flex items-center gap-2 w-full text-right px-4 py-3 bg-slate-800 text-white rounded-lg font-medium border-r-4 border-green-500">🗂️ أرشيف الطلبات</a>
            <a href="products.html" class="flex items-center gap-2 w-full text-right px-4 py-3 text-slate-300 hover:bg-slate-800 rounded-lg font-medium transition">🍎 إدارة المنتجات</a>
            <a href="settings.html" class="flex items-center gap-2 w-full text-right px-4 py-3 text-slate-300 hover:bg-slate-800 rounded-lg font-medium transition">⚙️ إعدادات المتجر</a>
            <a href="index.html" target="_blank" class="flex items-center gap-2 w-full text-right px-4 py-3 text-slate-300 hover:bg-slate-800 rounded-lg font-medium transition">🌐 عرض المتجر</a>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
            <div>
                <h1 class="text-xl font-bold text-slate-800">🗂️ أرشيف الطلبات</h1>
                <p class="text-xs text-slate-400 mt-0.5">كل الطلبات السابقة مرتبة بالتاريخ</p>
            </div>
        </header>

        <!-- Filter by date -->
        <div class="bg-white rounded-xl shadow-sm border p-4 mb-5 flex flex-wrap gap-3 items-end">
            <div>
                <label class="text-xs font-bold text-slate-600 mb-1 block">من تاريخ</label>
                <input type="date" id="filter-from" class="p-2 border rounded-lg text-sm focus:outline-green-500">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-600 mb-1 block">إلى تاريخ</label>
                <input type="date" id="filter-to" class="p-2 border rounded-lg text-sm focus:outline-green-500">
            </div>
            <button onclick="applyFilter()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">
                🔍 بحث
            </button>
            <button onclick="clearFilter()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition">
                ✖ مسح الفلتر
            </button>
        </div>

        <!-- Days sections -->
        <div id="archive-container">
            <p class="text-center text-slate-400 py-12">جاري التحميل...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/db.js"></script>
    <script>
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            // استبعاد طلبات اليوم
            const today = new Date().toDateString();
            allOrders = DB.orders.filter(o => new Date(o.created_at).toDateString() !== today);
            renderArchive(allOrders);
        });

        function applyFilter() {
            const from = document.getElementById('filter-from').value;
            const to   = document.getElementById('filter-to').value;
            let filtered = allOrders;
            if (from) filtered = filtered.filter(o => new Date(o.created_at) >= new Date(from));
            if (to)   filtered = filtered.filter(o => new Date(o.created_at) <= new Date(to + 'T23:59:59'));
            renderArchive(filtered);
        }

        function clearFilter() {
            document.getElementById('filter-from').value = '';
            document.getElementById('filter-to').value   = '';
            renderArchive(allOrders);
        }

        function renderArchive(orders) {
            const container = document.getElementById('archive-container');
            if (orders.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 py-12">لا توجد طلبات في هذه الفترة.</p>`;
                return;
            }

            // تجميع حسب اليوم
            const days = {};
            orders.forEach(o => {
                const day = new Date(o.created_at).toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
                if (!days[day]) days[day] = [];
                days[day].push(o);
            });

            container.innerHTML = Object.entries(days).map(([day, dayOrders]) => {
                const dayTotal  = dayOrders.reduce((s, o) => s + (Number(o.total)||0), 0);
                const delivered = dayOrders.filter(o => o.status === 'تم التسليم').length;

                const rows = dayOrders.map(order => {
                    const items = Array.isArray(order.items) ? order.items : [];
                    const itemsHtml = items.map(i => `<div class="text-xs text-slate-600">• ${i.name} (${i.qty} ${i.unit})</div>`).join('');
                    const createdAt = new Date(order.created_at).toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });

                    return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3 font-bold text-blue-600 text-sm">#${order.id} <div class="text-[10px] text-slate-400">${createdAt}</div></td>
                        <td class="p-3">
                            <div class="font-bold text-sm">${order.fullName||'—'}</div>
                            <div class="text-xs text-slate-400">${order.whatsapp||''}</div>
                        </td>
                        <td class="p-3 text-xs text-slate-600">${order.zone||''} — ${order.street||''} م${order.houseNumber||''}</td>
                        <td class="p-3 space-y-0.5">${itemsHtml}</td>
                        <td class="p-3 font-bold text-sm">${Number(order.total||0).toFixed(2)} ج</td>
                        <td class="p-3"><span class="${getStatusClass(order.status)}">${order.status||'—'}</span></td>
                        <td class="p-3">
                            <a href="https://wa.me/${(order.whatsapp||'').replace(/\D/g,'')}" target="_blank"
                               class="text-xs bg-green-100 hover:bg-green-200 text-green-700 px-2 py-1 rounded-lg font-bold transition">
                                💬 واتساب
                            </a>
                        </td>
                    </tr>`;
                }).join('');

                return `
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-bold text-slate-700">📅 ${day}</h3>
                        <div class="flex gap-3 text-xs">
                            <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-bold">${dayOrders.length} طلب</span>
                            <span class="bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold">مبيعات: ${dayTotal.toFixed(0)} ج</span>
                            <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-full font-bold">تسليم: ${delivered}</span>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-right">
                                <thead>
                                    <tr class="bg-slate-50 text-slate-500 text-xs border-b">
                                        <th class="p-3">رقم</th>
                                        <th class="p-3">العميل</th>
                                        <th class="p-3">العنوان</th>
                                        <th class="p-3">المنتجات</th>
                                        <th class="p-3">الإجمالي</th>
                                        <th class="p-3">الحالة</th>
                                        <th class="p-3">تواصل</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y text-sm">${rows}</tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
